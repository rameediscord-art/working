kind = "web"
previewPath = "/"
title = "Discord Digital Services"
version = "1.0.0"
id = "artifacts/discord-services"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23733

[services.development]
run = "pnpm --filter @workspace/discord-services run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-services", "run", "build" ]
publicDir = "artifacts/discord-services/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23733"
BASE_PATH = "/"
